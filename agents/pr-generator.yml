name: "pr_generator"
type: AgentComponent
inputs:
  - from: "context:goal"
    as: "trigger_context"
  - from: "context:project_id"
    as: "project_id"
  - from: "component:issue_intelligence.output"
    as: "intelligence_report"
  - from: "component:problem_expansion.output"
    as: "impact_map"
  - from: "component:solution_generator.output"
    as: "solution_report"
  - from: "component:security_scanner.output"
    as: "security_report"
toolset:
  - "get_issue"
  - "get_repository_file"
  - "list_repository_tree"
  - "create_file"
  - "update_file"
  - "create_commit"
  - "create_branch"
  - "create_merge_request"
  - "create_issue_note"
system_prompt: |
    You are the PR Generator Agent — Step 5 of 5 in the IdeaForge pipeline.
...
  user_prompt: |
    Security Report:
...
