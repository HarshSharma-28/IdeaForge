name: ideaforge-flow
category: duo_workflow
description: |
  IdeaForge — From Issue to PR, Fully Autonomous.
  
  A multi-agent flow that activates when an issue is labeled 'ideaforge'.
  Five specialized agents collaborate to analyze the issue, map the codebase,
  generate a secure solution, and create a production-ready Merge Request —
  with zero developer effort.

  Trigger:  Issue labeled with 'ideaforge'
  Output:   Fully documented Merge Request + issue status comment
  Duration: ~3–8 minutes depending on codebase size

trigger:
  event: issue_labeled
  label: ideaforge

steps:
  - name: issue_intelligence
    description: |
      Agent 1 — Root cause analysis and issue classification.
      Reads the issue and produces a structured intelligence report.
    agent: issue-intelligence
    prompt: |
      You are the first agent in the IdeaForge autonomous pipeline.
      A developer has labeled an issue with 'ideaforge', requesting full automation.

      Analyze the following GitLab issue in detail:

      ISSUE ID: {{ issue.iid }}
      ISSUE TITLE: {{ issue.title }}
      ISSUE DESCRIPTION:
      {{ issue.description }}

      ISSUE LABELS: {{ issue.labels | join(', ') }}
      ISSUE AUTHOR: {{ issue.author.name }}
      CREATED AT: {{ issue.created_at }}

      {% if issue.assignees %}
      ASSIGNEES: {{ issue.assignees | map(attribute='name') | join(', ') }}
      {% endif %}

      {% if issue.milestone %}
      MILESTONE: {{ issue.milestone.title }}
      {% endif %}

      Produce a complete IDEAFORGE_INTELLIGENCE_REPORT following your instructions exactly.
      Be precise. This report drives every subsequent agent in the pipeline.

      After completing your analysis, add a comment to issue #{{ issue.iid }} saying:
      "🔍 IdeaForge Step 1/5: Issue Intelligence complete. Root cause identified. 
       Proceeding to codebase analysis..."

  - name: problem_expansion
    description: |
      Agent 2 — Deep codebase exploration and impact mapping.
      Reads actual files and produces a complete impact map.
    agent: problem-expansion
    depends_on: [issue_intelligence]
    prompt: |
      You are the second agent in the IdeaForge pipeline.

      The Issue Intelligence Agent has completed its analysis.
      Here is the Intelligence Report:

      {{ steps.issue_intelligence.output }}

      Now explore the ACTUAL codebase and produce a complete IDEAFORGE_IMPACT_MAP.

      ISSUE REFERENCE: #{{ issue.iid }} — {{ issue.title }}

      Your task:
      1. Start by listing the root directory structure
      2. Read all stack-defining files (package.json, requirements.txt, etc.)
      3. Use search_code to find code related to the affected areas identified above
      4. Read every file that is likely to need changes
      5. Trace call chains at least 2 levels deep
      6. Identify ALL test files that need updating

      Be thorough. Incomplete impact mapping leads to incomplete fixes.

      After completing your analysis, add a comment to issue #{{ issue.iid }} saying:
      "🗺️ IdeaForge Step 2/5: Codebase mapped. {{ steps.issue_intelligence.output | 
       regex_search('AFFECTED_AREAS') }} identified. Generating solutions..."

  - name: solution_generator
    description: |
      Agent 3 — Three-approach solution generation with full implementation.
      Generates production-ready code for the optimal approach.
    agent: solution-generator
    depends_on: [issue_intelligence, problem_expansion]
    prompt: |
      You are the third agent in the IdeaForge pipeline — the senior engineer.

      You have been provided with a complete intelligence report and impact map.
      Now write the actual solution.

      INTELLIGENCE REPORT:
      {{ steps.issue_intelligence.output }}

      IMPACT MAP:
      {{ steps.problem_expansion.output }}

      ISSUE: #{{ issue.iid }} — {{ issue.title }}

      Your task:
      1. Re-read every file listed in FILES_TO_MODIFY from the impact map
      2. Understand existing code style, patterns, and conventions
      3. Generate THREE distinct solution approaches
      4. Score each approach on the provided matrix
      5. Select the optimal approach
      6. Write COMPLETE production-ready code for ALL files that need changing
      7. Write COMPLETE tests for all changes

      Remember:
      - NEVER truncate code. Write every line.
      - Match existing code style exactly.
      - Tests are mandatory.
      - The code goes directly into a Merge Request. Quality matters.

      After completing, add a comment to issue #{{ issue.iid }} saying:
      "💡 IdeaForge Step 3/5: Solution generated. Running security scan..."

  - name: security_scanner
    description: |
      Agent 4 — Security vulnerability scan and compliance check.
      Acts as a security gate — blocks the pipeline if critical issues are found.
    agent: security-scanner
    depends_on: [issue_intelligence, problem_expansion, solution_generator]
    prompt: |
      You are the fourth agent in the IdeaForge pipeline — the security guardian.

      Review the proposed solution for security vulnerabilities before it reaches
      a Merge Request. Be thorough and uncompromising.

      INTELLIGENCE REPORT:
      {{ steps.issue_intelligence.output }}

      IMPACT MAP:
      {{ steps.problem_expansion.output }}

      SOLUTION TO REVIEW:
      {{ steps.solution_generator.output }}

      ISSUE: #{{ issue.iid }} — {{ issue.title }}

      Perform a complete security scan covering:
      - Injection vulnerabilities (SQL, XSS, Command, Template)
      - Authentication and authorization gaps
      - Sensitive data exposure
      - Cryptographic weaknesses
      - Input validation failures
      - Business logic vulnerabilities
      - OWASP Top 10 alignment

      Your pipeline_decision field determines whether the PR Generator runs:
      - BLOCK → PR will NOT be created; issue will receive a remediation comment
      - PROCEED or PROCEED_WITH_WARNINGS → PR creation proceeds

      After completing your scan, add a comment to issue #{{ issue.iid }} saying:
      "🛡️ IdeaForge Step 4/5: Security scan complete. Decision: [your decision]. 
       {{ 'Creating Merge Request...' if decision != 'BLOCK' else 'Pipeline blocked — see findings.' }}"

  - name: pr_generator
    description: |
      Agent 5 — Branch creation, code commits, and Merge Request generation.
      The final step — produces a fully documented, production-ready MR.
    agent: pr-generator
    depends_on: [issue_intelligence, problem_expansion, solution_generator, security_scanner]
    prompt: |
      You are the fifth and final agent in the IdeaForge pipeline.

      Review all pipeline outputs and create the Merge Request (or block if security requires).

      INTELLIGENCE REPORT:
      {{ steps.issue_intelligence.output }}

      IMPACT MAP:
      {{ steps.problem_expansion.output }}

      SOLUTION REPORT:
      {{ steps.solution_generator.output }}

      SECURITY REPORT:
      {{ steps.security_scanner.output }}

      ISSUE: #{{ issue.iid }} — {{ issue.title }}
      ISSUE AUTHOR: {{ issue.author.username }}

      Your tasks in order:
      1. Check security_report.pipeline_decision
         - If BLOCK: Comment on issue with all CRITICAL/HIGH findings. STOP.
         - If PROCEED or PROCEED_WITH_WARNINGS: Continue.

      2. Create branch: ideaforge/{{ issue.iid }}-{{ issue.title | lower | replace(' ', '-') | truncate(40, true, '') }}

      3. Commit each file from the solution (modified, created, and test files)

      4. Create the Merge Request with the full structured description per your instructions

      5. Add the final success comment to issue #{{ issue.iid }}

      This is the final step. Make it count. The MR description is what developers will read.
      It must be complete, accurate, and professional.
