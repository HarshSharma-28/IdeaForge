name: "IdeaForge Pipeline Flow"
description: "A continuous flow from Issue to Merge Request"
public: true
definition:
  version: v1
  environment: ambient
  
  components:
    - name: "ideaforge_agent"
      type: AgentComponent
      prompt_id: "ideaforge_prompt"
      inputs:
        - "context:goal"
      toolset:
        - get_issue
        - read_file
        - read_files
        - create_commit
        - create_merge_request
      ui_log_events:
        - on_agent_final_answer
        - on_tool_execution_success
  
  prompts:
    - prompt_id: "ideaforge_prompt"
      name: "IdeaForge Orchestrator Prompt"
      prompt_template:
        system: |
          You are IdeaForge, an elite autonomous software engineer.
          Your goal is to process GitLab issues end-to-end:
          1. Analyze the issue deeply to find the root cause.
          2. Map affected files and risk areas.
          3. Generate a solution and scan for security vulnerabilities.
          4. Write the code and create a Branch and Merge Request.
        user: |
          {{goal}}
        placeholder: history
      unit_primitives: []
      params:
        timeout: 300
  
  routers:
    - from: "ideaforge_agent"
      to: "end"
      
  flow:
    entry_point: "ideaforge_agent"
