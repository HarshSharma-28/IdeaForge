name: "IdeaForge Production Flow"
description: "Orchestration flow for IdeaForge agents."
public: true
definition:
  version: v1
  environment: ambient
  components:
    - name: "ideaforge_coordinator"
      type: AgentComponent
      prompt_id: "coordinator_prompt"
      inputs:
        - "context:goal"
      toolset: []
  prompts:
    - prompt_id: "coordinator_prompt"
      name: "Coordinator Prompt"
      prompt_template:
        system: |
          You are an automated orchestration bot.
        user: |
          {{goal}}
        placeholder: history
      unit_primitives: []
      params:
        timeout: 180
  routers:
    - from: "ideaforge_coordinator"
      to: "end"
  flow:
    entry_point: "ideaforge_coordinator"
